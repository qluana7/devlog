name: Deploy Blog

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        env:
          GISCUS_ENABLED: ${{ secrets.GISCUS_ENABLED }}
          GISCUS_REPO: ${{ secrets.GISCUS_REPO }}
          GISCUS_REPO_ID: ${{ secrets.GISCUS_REPO_ID }}
          GISCUS_CATEGORY: ${{ secrets.GISCUS_CATEGORY }}
          GISCUS_CATEGORY_ID: ${{ secrets.GISCUS_CATEGORY_ID }}
          GISCUS_MAPPING: ${{ secrets.GISCUS_MAPPING }}
          GISCUS_STRICT: ${{ secrets.GISCUS_STRICT }}
          GISCUS_THEME: ${{ secrets.GISCUS_THEME }}
          ENGAGEMENT_ENABLED: ${{ secrets.ENGAGEMENT_ENABLED }}
          ENGAGEMENT_SUPABASE_URL: ${{ secrets.ENGAGEMENT_SUPABASE_URL }}
          ENGAGEMENT_SUPABASE_ANON_KEY: ${{ secrets.ENGAGEMENT_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
